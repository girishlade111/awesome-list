---
name: "Submit a Resource"
description: "Submit a new agent, prompt, plugin, instruction, or workflow to DevHub."
title: "[Resource]: "
labels: ["resource", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to contribute to DevHub! Please fill out the form below to submit your resource.
  - type: input
    id: title
    attributes:
      label: Resource Title
      description: "A clear, descriptive title for your resource"
      placeholder: "e.g., Code Review Agent"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "A brief description of what your resource does (2-3 sentences)"
      placeholder: "An AI agent that performs comprehensive code reviews..."
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: "What type of resource is this?"
      options:
        - Agent
        - Prompt
        - Instruction
        - Plugin
        - Workflow
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Resource URL
      description: "Link to the resource (GitHub repo, documentation, etc.)"
      placeholder: "https://github.com/username/repo"
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Tags
      description: "Comma-separated list of relevant tags"
      placeholder: "e.g., review, security, quality"
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: "This resource is original or properly licensed"
          required: true
        - label: "I have included a clear description"
          required: true
        - label: "I have added relevant tags for discoverability"
          required: true
        - label: "I have tested this resource (if applicable)"
          required: false
